<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard - GD Skill Points</title>
    <link rel="stylesheet" href="auth.css">
    <style>
        body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #2b0000, #090000 65%, #000000); color: white; font-family: Arial, sans-serif; text-align: center; }
        .panel { width: min(92%, 900px); margin: 40px auto; padding: 28px 22px; background: rgba(24, 3, 3, 0.92); border: 1px solid #ff4d4d; border-radius: 14px; box-shadow: 0 0 24px rgba(255, 77, 77, 0.2); }
        h1 { margin-top: 0; color: #ff6666; text-shadow: 0 0 10px rgba(255, 77, 77, 0.45); }
        .top-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
        button,a.button-link { border: none; border-radius: 8px; padding: 10px 16px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 15px; }
        button:disabled { cursor: wait; opacity: 0.65; }
        .danger { background: #c91616; color: white; }
        .home-link { background: #ff6666; color: white; }
        #list { margin-top: 18px; }
        .score-card { background: #180808; margin: 12px auto; width: min(100%, 560px); border-left: 5px solid #ff4d4d; border-radius: 10px; box-sizing: border-box; overflow: hidden; }
        .score-main { display: flex; justify-content: space-between; align-items: center; gap: 12px; text-align: left; padding: 16px; }
        .score-text { font-size: 18px; word-break: break-word; }
        .score-actions { display: flex; align-items: center; gap: 10px; }
        .empty { color: #ffb3b3; margin-top: 30px; }
        .delete-one { background: #ff3b3b; color: white; min-width: 42px; }
        @media (max-width: 560px) { .panel { margin: 20px auto; padding: 22px 14px; } .score-main { flex-direction: column; align-items: stretch; } .score-actions { justify-content: space-between; } }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<body>
    <div class="auth-top-right"><button class="auth-button" id="loginButton" onclick="openLoginPopup()">Log In</button><div class="auth-info" id="loginInfo"><div class="auth-name" id="loginName">Guest</div><div class="auth-role" id="loginRole">user</div><button class="auth-button" onclick="openAccountPopup()">Log Out</button></div></div>
    <div class="auth-overlay" id="loginOverlay"><div class="auth-popup"><div class="auth-close-row"><button class="auth-close-button" onclick="closeLoginPopup()">X</button></div><h2>Log In</h2><p class="auth-popup-text">Log in or create an account to manage your profile.</p><div class="auth-field"><label for="username">Username</label><input id="username" type="text" placeholder="Enter username"></div><div class="auth-field"><label for="password">Password</label><input id="password" type="password" placeholder="Password"></div><button class="auth-button auth-full" onclick="submitLogin()">Submit</button><div class="auth-error" id="errorText">Wrong username or password.</div></div></div>
    <div class="auth-overlay" id="accountOverlay"><div class="auth-popup"><div class="auth-close-row"><button class="auth-close-button" onclick="closeAccountPopup()">X</button></div><h2>Account</h2><div class="auth-panel-top"><div class="auth-name" id="panelName">Guest</div><div class="auth-role" id="panelRole">user</div></div><p class="auth-popup-text">This can hold more account buttons later. For now, the button below logs you out.</p><button class="auth-panel-button auth-full" onclick="logOut()">Log Out</button></div></div>

    <div class="panel"><h1>Leaderboard</h1><div class="top-bar"><a class="button-link home-link" href="index.html">Back to Home</a><button class="danger" id="deleteAllButton" onclick="deleteAll()">Delete All Scores</button></div><div id="list"></div></div>

    <script>
        const LEADERBOARD_TABLE = "leaderboard";
        const PROFILES_TABLE = "profiles";
        let list = null;
        let deleteAllButton = null;
        let leaderboardRows = [];
        let leaderboardError = "";
        let deletingAllScores = false;
        let deletingUserId = "";
        let leaderboardRealtimeChannel = null;

        function getLeaderboardClient() {
            if (typeof getSupabaseClient === "function") {
                return getSupabaseClient();
            }

            return window.supabaseClient || null;
        }

        function unsubscribeLeaderboardRealtime() {
            const supabaseClient = getLeaderboardClient();
            if (supabaseClient && leaderboardRealtimeChannel && typeof supabaseClient.removeChannel === "function") {
                supabaseClient.removeChannel(leaderboardRealtimeChannel);
            }

            leaderboardRealtimeChannel = null;
        }

        function syncLeaderboardRealtimeSubscription() {
            const supabaseClient = getLeaderboardClient();
            if (!supabaseClient) {
                unsubscribeLeaderboardRealtime();
                return;
            }

            if (leaderboardRealtimeChannel) {
                return;
            }

            leaderboardRealtimeChannel = supabaseClient
                .channel("gd-leaderboard-live")
                .on("postgres_changes", {
                    event: "*",
                    schema: "public",
                    table: LEADERBOARD_TABLE
                }, () => {
                    refreshLeaderboard();
                })
                .on("postgres_changes", {
                    event: "*",
                    schema: "public",
                    table: PROFILES_TABLE
                }, () => {
                    refreshLeaderboard();
                })
                .subscribe((status) => {
                    if (status === "CHANNEL_ERROR") {
                        console.warn("Supabase realtime subscription failed for leaderboard.");
                    }
                });
        }

        function leaderboardAdminEnabled() {
            if (typeof getCurrentUser !== "function") {
                return false;
            }

            const user = getCurrentUser();
            return Boolean(
                user
                && user.user_metadata
                && user.user_metadata.role === "admin"
            );
        }

        function normalizeLeaderboardRow(row, usernameByUserId = new Map()) {
            const points = Math.floor(Number(
                row && (row.score ?? row.points ?? row.total_points ?? 0)
            ) || 0));
            const userId = String(row && (row.user_id ?? row.userId ?? "") || "").trim();
            const username = String(
                usernameByUserId.get(userId)
                || (row && (
                    row.username
                    ?? row.name
                    ?? row.player_name
                    ?? row.playerName
                    ?? row.display_name
                    ?? row.displayName
                ))
                || userId
                || "Unknown Player"
            ).trim() || "Unknown Player";

            return {
                userId,
                username,
                points
            };
        }

        async function loadLeaderboardRows() {
            const supabaseClient = getLeaderboardClient();
            if (!supabaseClient) {
                leaderboardRows = [];
                leaderboardError = "Leaderboard is unavailable right now.";
                return;
            }

            const scoresRequest = supabaseClient
                .from(LEADERBOARD_TABLE)
                .select("user_id, score");
            const profilesRequest = supabaseClient
                .from(PROFILES_TABLE)
                .select("id, username");

            const [{ data: scores, error: scoresError }, { data: profiles, error: profilesError }] = await Promise.all([
                scoresRequest,
                profilesRequest
            ]);

            if (scoresError) {
                console.error("Failed to load leaderboard scores:", scoresError);
                leaderboardRows = [];
                leaderboardError = "Failed to load leaderboard.";
                return;
            }

            if (profilesError) {
                console.warn("Failed to load leaderboard usernames from profiles:", profilesError);
            }

            const usernameByUserId = new Map();
            if (Array.isArray(profiles)) {
                profiles.forEach((profile) => {
                    const profileId = String(profile && profile.id || "").trim();
                    if (!profileId) {
                        return;
                    }

                    usernameByUserId.set(profileId, String(profile && profile.username || "").trim() || profileId);
                });
            }

            leaderboardRows = Array.isArray(scores)
                ? scores
                    .map((row) => normalizeLeaderboardRow(row, usernameByUserId))
                    .filter((entry) => entry.userId)
                    .sort((a, b) => b.points - a.points)
                : [];
            leaderboardError = "";
        }

        function renderLeaderboardRows() {
            if (!list || !deleteAllButton) {
                return;
            }

            const adminEnabled = leaderboardAdminEnabled();
            const deleteInProgress = deletingAllScores || Boolean(deletingUserId);

            list.innerHTML = "";
            deleteAllButton.style.display = adminEnabled ? "inline-block" : "none";
            deleteAllButton.disabled = deleteInProgress;
            deleteAllButton.textContent = deletingAllScores ? "Deleting..." : "Delete All Scores";

            if (leaderboardError) {
                list.innerHTML = `<p class="empty">${escapeHtml(leaderboardError)}</p>`;
                return;
            }

            if (leaderboardRows.length === 0) {
                list.innerHTML = '<p class="empty">No scores yet.</p>';
                return;
            }

            leaderboardRows.forEach((entry, index) => {
                const card = document.createElement("div");
                const main = document.createElement("div");
                const info = document.createElement("div");
                const scoreText = document.createElement("div");
                const actions = document.createElement("div");

                card.className = "score-card";
                main.className = "score-main";
                info.className = "score-info";
                scoreText.className = "score-text";
                actions.className = "score-actions";

                scoreText.textContent = `${index + 1}. ${entry.username} - ${entry.points} pts`;
                info.appendChild(scoreText);

                if (adminEnabled) {
                    const deleteButton = document.createElement("button");
                    const isDeletingThisRow = deletingUserId === entry.userId;

                    deleteButton.className = "delete-one";
                    deleteButton.textContent = isDeletingThisRow ? "..." : "X";
                    deleteButton.disabled = deleteInProgress;
                    deleteButton.onclick = async (event) => {
                        event.stopPropagation();
                        await deleteScore(entry.userId);
                    };
                    actions.appendChild(deleteButton);
                }

                main.appendChild(info);
                main.appendChild(actions);
                card.appendChild(main);
                list.appendChild(card);
            });
        }

        async function refreshLeaderboard() {
            await loadLeaderboardRows();
            renderLeaderboardRows();
        }

        async function deleteScore(targetUserId) {
            if (!leaderboardAdminEnabled() || !targetUserId) {
                return;
            }

            if (!confirm("Are you sure you want to delete this score?")) {
                return;
            }

            const supabaseClient = getLeaderboardClient();
            if (!supabaseClient) {
                console.error("Supabase client is unavailable during single-score delete.");
                return;
            }

            deletingUserId = targetUserId;
            renderLeaderboardRows();

            try {
                const { error } = await supabaseClient
                    .from(LEADERBOARD_TABLE)
                    .delete()
                    .eq("user_id", targetUserId);

                if (error) {
                    console.error("Failed to delete leaderboard score:", error);
                    return;
                }

                await refreshLeaderboard();
            } finally {
                deletingUserId = "";
                renderLeaderboardRows();
            }
        }

        async function deleteAll() {
            if (!leaderboardAdminEnabled()) {
                return;
            }

            if (!confirm("ARE YOU SURE?")) {
                return;
            }

            if (!confirm("This cannot be undone. Continue?")) {
                return;
            }

            const supabaseClient = getLeaderboardClient();
            if (!supabaseClient) {
                console.error("Supabase client is unavailable during bulk score delete.");
                return;
            }

            deletingAllScores = true;
            renderLeaderboardRows();

            try {
                const { error } = await supabaseClient
                    .from(LEADERBOARD_TABLE)
                    .delete()
                    .not("user_id", "is", null);

                if (error) {
                    console.error("Failed to delete all leaderboard scores:", error);
                    return;
                }

                await refreshLeaderboard();
            } finally {
                deletingAllScores = false;
                renderLeaderboardRows();
            }
        }

        async function updatePageForAuth() {
            syncLeaderboardRealtimeSubscription();
            await refreshLeaderboard();
        }

        document.addEventListener("DOMContentLoaded", () => {
            list = document.getElementById("list");
            deleteAllButton = document.getElementById("deleteAllButton");
            syncLeaderboardRealtimeSubscription();
            refreshLeaderboard();
        });

        window.addEventListener("focus", () => {
            refreshLeaderboard();
        });

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) {
                refreshLeaderboard();
            }
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
