<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard - GD Skill Points</title>
    <link rel="stylesheet" href="auth.css">
    <style>
        body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #2b0000, #090000 65%, #000000); color: white; font-family: Arial, sans-serif; text-align: center; }
        .panel { width: min(92%, 900px); margin: 40px auto; padding: 28px 22px; background: rgba(24, 3, 3, 0.92); border: 1px solid #ff4d4d; border-radius: 14px; box-shadow: 0 0 24px rgba(255, 77, 77, 0.2); }
        h1 { margin-top: 0; color: #ff6666; text-shadow: 0 0 10px rgba(255, 77, 77, 0.45); }
        .top-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
        button,a.button-link { border: none; border-radius: 8px; padding: 10px 16px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 15px; }
        .danger { background: #c91616; color: white; }
        .home-link { background: #ff6666; color: white; }
        #list { margin-top: 18px; }
        .score-card { background: #180808; margin: 12px auto; width: min(100%, 560px); border-left: 5px solid #ff4d4d; border-radius: 10px; box-sizing: border-box; overflow: hidden; }
        .score-main { display: flex; justify-content: space-between; align-items: center; gap: 12px; text-align: left; padding: 16px; }
        .score-text { font-size: 18px; word-break: break-word; }
        .score-actions { display: flex; align-items: center; gap: 10px; }
        .empty { color: #ffb3b3; margin-top: 30px; }
        .delete-one { background: #ff3b3b; color: white; min-width: 42px; }
        @media (max-width: 560px) { .panel { margin: 20px auto; padding: 22px 14px; } .score-main { flex-direction: column; align-items: stretch; } .score-actions { justify-content: space-between; } }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<body>
    <div class="auth-top-right"><button class="auth-button" id="loginButton" onclick="openLoginPopup()">Log In</button><div class="auth-info" id="loginInfo"><div class="auth-name" id="loginName">Guest</div><div class="auth-role" id="loginRole">user</div><button class="auth-button" onclick="openAccountPopup()">Log Out</button></div></div>
    <div class="auth-overlay" id="loginOverlay"><div class="auth-popup"><div class="auth-close-row"><button class="auth-close-button" onclick="closeLoginPopup()">X</button></div><h2>Log In</h2><p class="auth-popup-text">Log in to view your account and admin tools.</p><div class="auth-field"><label for="username">Username</label><input id="username" type="text" placeholder="Enter username"></div><div class="auth-field"><label for="password">Password</label><input id="password" type="password" placeholder="Password"></div><button class="auth-button auth-full" onclick="submitLogin()">Submit</button><div class="auth-error" id="errorText">Wrong username or password.</div></div></div>
    <div class="auth-overlay" id="accountOverlay"><div class="auth-popup"><div class="auth-close-row"><button class="auth-close-button" onclick="closeAccountPopup()">X</button></div><h2>Account</h2><div class="auth-panel-top"><div class="auth-name" id="panelName">Guest</div><div class="auth-role" id="panelRole">user</div></div><p class="auth-popup-text">This can hold more account buttons later. For now, the button below logs you out.</p><button class="auth-panel-button auth-full" onclick="logOut()">Log Out</button></div></div>

    <div class="panel"><h1>Leaderboard</h1><div class="top-bar"><a class="button-link home-link" href="index.html">Back to Home</a><button class="danger" id="deleteAllButton" onclick="deleteAll()">Delete All Scores</button></div><div id="list"></div></div>

    <script>
        const LEADERBOARD_TABLE = "leaderboard";

        function leaderboardAdminEnabled() {
            return isAdminLoggedIn();
        }

        const list = document.getElementById("list");
        const deleteAllButton = document.getElementById("deleteAllButton");
        let leaderboardRows = [];
        let leaderboardRequestToken = 0;

        function getLeaderboardSupabaseClient() {
            if (typeof getSupabaseClient === "function") {
                return getSupabaseClient();
            }

            return window.supabaseClient || null;
        }

        function normalizeLeaderboardValue(value) {
            return String(value || "").trim();
        }

        function normalizeLeaderboardIdentifier(row) {
            const userId = normalizeLeaderboardValue(row && (row.user_id || row.userId)).toLowerCase();
            if (userId) {
                return `user:${userId}`;
            }

            const email = normalizeLeaderboardValue(row && row.email).toLowerCase();
            if (email) {
                return `email:${email}`;
            }

            const username = normalizeLeaderboardValue(row && row.username).toLowerCase();
            if (username) {
                return `username:${username}`;
            }

            const name = normalizeLeaderboardValue(row && row.name).toLowerCase();
            if (name) {
                return `name:${name}`;
            }

            const id = normalizeLeaderboardValue(row && row.id);
            return id ? `row:${id}` : "";
        }

        function normalizeLeaderboardRow(row) {
            const id = normalizeLeaderboardValue(row && row.id);
            const email = normalizeLeaderboardValue(row && row.email);
            const username = normalizeLeaderboardValue(row && row.username);
            const name = normalizeLeaderboardValue(row && row.name);
            const displayName = email || username || name || normalizeLeaderboardValue(row && (row.user_id || row.userId)) || "Unknown player";
            const submittedAt = normalizeLeaderboardValue(
                row && (row.submitted_at || row.submittedAt || row.created_at || row.createdAt || row.updated_at || row.updatedAt)
            );
            const submittedTime = submittedAt ? Date.parse(submittedAt) : 0;

            return {
                raw: row,
                id,
                identifier: normalizeLeaderboardIdentifier(row),
                displayName,
                score: Math.max(0, Math.floor(Number(row && (row.score ?? row.points)) || 0)),
                submittedAt,
                submittedTime: Number.isNaN(submittedTime) ? 0 : submittedTime
            };
        }

        function getDisplayLeaderboardRows() {
            const uniqueById = new Map();
            leaderboardRows.forEach((row) => {
                const normalizedRow = normalizeLeaderboardRow(row);
                if (normalizedRow.id && !uniqueById.has(normalizedRow.id)) {
                    uniqueById.set(normalizedRow.id, normalizedRow);
                }
            });

            const rankedRows = [...uniqueById.values()].sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                }

                return b.submittedTime - a.submittedTime;
            });

            const dedupedRows = [];
            const seenIdentifiers = new Set();

            rankedRows.forEach((row) => {
                if (row.identifier && seenIdentifiers.has(row.identifier)) {
                    return;
                }

                if (row.identifier) {
                    seenIdentifiers.add(row.identifier);
                }

                dedupedRows.push(row);
            });

            return dedupedRows;
        }

        function renderLeaderboard() {
            if (!list || !deleteAllButton) return;

            list.innerHTML = "";
            deleteAllButton.style.display = leaderboardAdminEnabled() ? "inline-block" : "none";

            const sortedScores = getDisplayLeaderboardRows();
            if (sortedScores.length === 0) {
                list.innerHTML = '<p class="empty">No scores yet.</p>';
                return;
            }

            sortedScores.forEach((entry, index) => {
                const card = document.createElement("div");
                const main = document.createElement("div");
                const info = document.createElement("div");
                const scoreText = document.createElement("div");
                const actions = document.createElement("div");

                card.className = "score-card";
                main.className = "score-main";
                info.className = "score-info";
                scoreText.className = "score-text";
                actions.className = "score-actions";

                scoreText.textContent = `${index + 1}. ${entry.displayName} - ${entry.score} pts`;
                info.appendChild(scoreText);

                if (leaderboardAdminEnabled()) {
                    const deleteButton = document.createElement("button");
                    deleteButton.className = "delete-one";
                    deleteButton.textContent = "X";
                    deleteButton.onclick = async (event) => {
                        event.stopPropagation();
                        await deleteScore(entry.id);
                    };
                    actions.appendChild(deleteButton);
                }

                main.appendChild(info);
                main.appendChild(actions);
                card.appendChild(main);
                list.appendChild(card);
            });
        }

        async function refreshLeaderboard() {
            const supabaseClient = getLeaderboardSupabaseClient();
            if (!supabaseClient) {
                leaderboardRows = [];
                renderLeaderboard();
                return;
            }

            const requestToken = ++leaderboardRequestToken;
            const { data, error } = await supabaseClient
                .from(LEADERBOARD_TABLE)
                .select("*");

            if (requestToken !== leaderboardRequestToken) {
                return;
            }

            if (error) {
                console.error("Failed to load leaderboard from Supabase:", error);
                leaderboardRows = [];
                renderLeaderboard();
                return;
            }

            leaderboardRows = Array.isArray(data) ? data : [];
            renderLeaderboard();
        }

        async function deleteScore(rowId) {
            if (!leaderboardAdminEnabled() || !rowId) return;

            const supabaseClient = getLeaderboardSupabaseClient();
            if (!supabaseClient) {
                return;
            }

            const { error } = await supabaseClient
                .from(LEADERBOARD_TABLE)
                .delete()
                .eq("id", rowId);

            if (error) {
                console.error("Failed to delete leaderboard row:", error);
                return;
            }

            await refreshLeaderboard();
        }

        async function deleteAll() {
            if (!leaderboardAdminEnabled()) return;
            if (!confirm("Delete every leaderboard entry?")) return;

            const rows = getDisplayLeaderboardRows();
            for (const row of rows) {
                await deleteScore(row.id);
            }
        }

        function updatePageForAuth() {
            renderLeaderboard();
        }

        document.addEventListener("DOMContentLoaded", () => {
            refreshLeaderboard().catch((error) => {
                console.error("Leaderboard refresh failed:", error);
            });
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
